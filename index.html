<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TaskFlow - Smart To Do List</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="title">
                <h1>
                    <i class="fa-solid fa-list-check"></i>
                    TaskFlow
                </h1>
                <p>Manage your daily tasks easily</p>
            </div>
            <!-- Dark Mode Button -->
            <button id="themeBtn" class="theme-btn">
                <i class="fa-solid fa-moon"></i>
            </button>
        </header>
        <!-- Search Box -->
        <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input
                type="text"
                id="searchTask"
                placeholder="Search your task...">
        </div>
        <!-- Input Section -->
        <div class="input-section">
            <input
                type="text"
                id="taskInput"
                placeholder="Enter a new task">
            <button id="addBtn">
                <i class="fa-solid fa-plus"></i>
                Add
            </button>
        </div>
        <!-- Statistics -->
        <div class="stats">
            <div class="card">
                <h2 id="totalTask">0</h2>
                <p>Total</p>
            </div>
            <div class="card">
                <h2 id="completedTask">0</h2>
                <p>Completed</p>
            </div>
            <div class="card">
                <h2 id="pendingTask">0</h2>
                <p>Pending</p>
            </div>
        </div>
        <!-- Task List -->
        <ul id="taskList">
            <!-- Tasks will appear here -->
        </ul>
        <!-- Buttons -->
        <div class="bottom-buttons">
            <button id="clearAll">
                <i class="fa-solid fa-trash"></i>
                Clear All
            </button>
        </div>
       <!-- Footer -->
        <footer>
        <div class="footer-content">
            <h3>TaskFlow</h3>
            <p>Stay organized. Stay productive.</p>
            <div class="social-icons">
                <a href="https://github.com/DevallaKeerthana" target="_blank">
                    <i class="fa-brands fa-github"></i>
                </a>
                <a href="https://www.linkedin.com/in/devalla-keerthana-0b95ab2a2/" target="_blank">
                    <i class="fa-brands fa-linkedin"></i>
                </a>
            </div>
        </div>
        </footer>
    </div>
    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
